version: "3.9"

services:
  datasheriff-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: datasheriff-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: uvicorn server:app --host 0.0.0.0 --port 8000

  datasheriff-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: datasheriff-bot
    env_file:
      - .env
    command: python -m slack_bot.bot
    restart: unless-stopped
    depends_on:
      - datasheriff-backend

  datasheriff-web:
    build:
      context: ./web_ui
      dockerfile: Dockerfile
    container_name: datasheriff-web
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - VITE_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - datasheriff-backend
